<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>GitHub AI/ML 周报合集</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans SC",sans-serif;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
  color:#eee;min-height:100vh;padding:60px 20px;
}
.container{max-width:800px;margin:0 auto}
header{text-align:center;margin-bottom:50px}
header h1{
  font-size:2.4rem;font-weight:700;
  background:linear-gradient(90deg,#e94560,#f5a623,#e94560);
  background-size:200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  animation:shimmer 3s linear infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
header p{color:#aaa;margin-top:12px;font-size:1rem}
.latest{
  background:rgba(233,69,96,0.15);border:2px solid rgba(233,69,96,0.4);
  border-radius:16px;padding:30px;margin-bottom:40px;text-align:center;
}
.latest .badge{
  display:inline-block;background:#e94560;color:#fff;
  padding:4px 14px;border-radius:20px;font-size:0.8rem;font-weight:600;
  margin-bottom:12px;
}
.latest h2{font-size:1.5rem;margin-bottom:10px}
.latest a{
  display:inline-block;margin-top:15px;padding:12px 30px;
  background:linear-gradient(135deg,#e94560,#f5a623);
  color:#fff;text-decoration:none;border-radius:8px;font-weight:600;
  transition:transform .2s,box-shadow .2s;
}
.latest a:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(233,69,96,0.4)}
h3{color:#aaa;font-size:0.9rem;margin-bottom:15px;text-transform:uppercase;letter-spacing:2px}
.archive-list{list-style:none}
.archive-list li{
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
  border-radius:10px;margin-bottom:10px;
  transition:all .2s;
}
.archive-list li:hover{background:rgba(255,255,255,0.1);transform:translateX(4px)}
.archive-list a{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 20px;color:#eee;text-decoration:none;
}
.archive-list .date{font-weight:600;font-size:1.05rem}
.archive-list .arrow{color:#e94560;font-size:1.2rem}
footer{
  text-align:center;margin-top:50px;padding-top:20px;
  border-top:1px solid rgba(255,255,255,0.06);color:#666;font-size:0.8rem;
}
footer a{color:#e94560;text-decoration:none}
</style>
</head>
<body>
<div class="container">
<header>
  <h1>🤖 GitHub AI/ML 周报合集</h1>
  <p>每周一自动更新 · 精选 AI 领域热门开源项目</p>
</header>

<div class="latest">
